services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: dev_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
      - db
    volumes:
      - ${PWD}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${PWD}/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${PWD}/.devcerts:/certs:ro
      - ${PWD}/static:/srv/static:ro
    networks:
      - devnet

  app:
    build:
      context: .
      dockerfile: ./app/Dockerfile
    image: app:dev-latest
    container_name: dev_app
    env_file: .env
    expose:
      - "8000"
    volumes:
      - ./app:/app:cached
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    networks:
      - devnet

  maildev:
    image: maildev/maildev:2.0.5
    container_name: dev_maildev
    env_file: .env
    ports:
      - "127.0.0.1:1080:1080"   # Web UI
      - "127.0.0.1:1025:1025"   # SMTP
    networks: [ devnet ]

  db:
    image: postgres:16-alpine
    container_name: dev_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"   # bind to localhost only (safe)
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [ devnet ]

volumes:
  dbdata:

networks:
  devnet:
    driver: bridge
