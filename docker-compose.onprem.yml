# Docker Compose for on-prem/staging deployments
# Uses Let's Encrypt certificates instead of local dev certs
#
# Usage:
#   1. Run ./devscripts/onprem-setup.sh to generate certs and .env
#   2. docker compose -f docker-compose.onprem.yml up -d
#   3. Apply migrations: make migrate-onprem

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: onprem_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
      - db
    volumes:
      - ${PWD}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${PWD}/nginx/conf.d/app.onprem.conf:/etc/nginx/conf.d/app.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ${PWD}/static:/srv/static:ro
    networks:
      - onpremnet
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: ./app/Dockerfile
    image: app:onprem-latest
    container_name: onprem_app
    env_file: .env
    expose:
      - "8000"
    volumes:
      - ./app:/app:cached
      - ./storage:/app/storage
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    networks:
      - onpremnet
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: ./app/Dockerfile
    image: app:onprem-latest
    container_name: onprem_worker
    env_file: .env
    volumes:
      - ./app:/app:cached
      - ./storage:/app/storage
    entrypoint: []
    command: ["python", "worker.py"]
    working_dir: /app
    depends_on:
      - db
      - memcached
    networks:
      - onpremnet
    restart: unless-stopped

  memcached:
    image: memcached:1.6-alpine
    container_name: onprem_memcached
    expose:
      - "11211"
    networks: [ onpremnet ]
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: onprem_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # bind to localhost only (safe)
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [ onpremnet ]
    restart: unless-stopped

  migrate:
    image: app:onprem-latest
    container_name: onprem_migrate
    entrypoint: []
    command: ["python", "/db-init/migrate.py"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_DB: appdb
    volumes:
      - ./db-init:/db-init:ro
    depends_on:
      db:
        condition: service_healthy
    networks: [onpremnet]
    profiles: ["migrate"]

volumes:
  dbdata:

networks:
  onpremnet:
    driver: bridge
