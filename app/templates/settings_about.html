{% extends "base.html" %}

{% block title %}About - {{ site_title }}{% endblock %}

{% block content %}
<div class="max-w-4xl">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm p-8">
        <h1 class="text-2xl font-semibold mb-6 text-gray-900 dark:text-gray-100">About WeftID</h1>

        <div class="space-y-8">
            <!-- Version -->
            <div>
                <h2 class="text-lg font-medium text-gray-900 dark:text-gray-100 mb-2">Version</h2>
                <p class="text-sm text-gray-600 dark:text-gray-400">{{ version }}</p>
            </div>

            <!-- Documentation -->
            <div>
                <h2 class="text-lg font-medium text-gray-900 dark:text-gray-100 mb-3">Documentation</h2>
                <ul class="space-y-2">
                    <li>
                        <a href="/docs/getting-started/" target="_blank"
                           class="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-900 dark:hover:text-blue-300">
                            Getting Started
                        </a>
                    </li>
                    <li>
                        <a href="/docs/admin-guide/" target="_blank"
                           class="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-900 dark:hover:text-blue-300">
                            Admin Guide
                        </a>
                    </li>
                    <li>
                        <a href="/docs/api/" target="_blank"
                           class="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-900 dark:hover:text-blue-300">
                            API Reference
                        </a>
                    </li>
                    <li>
                        <a href="/docs/glossary/" target="_blank"
                           class="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-900 dark:hover:text-blue-300">
                            Glossary
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Pageloom -->
            <div class="border-t border-gray-200 dark:border-gray-700 pt-6">
                <p class="text-sm text-gray-600 dark:text-gray-400">
                    WeftID is built by
                    <a href="https://pageloom.com" target="_blank" rel="noopener noreferrer"
                       class="text-blue-600 dark:text-blue-400 hover:text-blue-900 dark:hover:text-blue-300">
                        Pageloom</a>.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
