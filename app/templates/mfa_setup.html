{% extends "base.html" %}

{% block title %}Enable Two-Factor Authentication - Loom{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="w-full max-w-2xl">
        <div class="bg-white rounded-lg shadow-sm p-8">
            <h1 class="text-2xl font-semibold text-center mb-2">Enable Two-Factor Authentication</h1>
            <p class="text-gray-600 text-center mb-8">Choose your preferred authentication method</p>

            <div class="space-y-4">
                <!-- Passcode (Recommended) -->
                <form method="post" action="/mfa/setup/passcode">
                    <button type="submit" class="w-full text-left border-2 border-blue-200 hover:border-blue-400 rounded-lg p-6 transition duration-150 bg-blue-50">
                        <div class="flex items-start">
                            <div class="flex-shrink-0">
                                <svg class="h-6 w-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                </svg>
                            </div>
                            <div class="ml-4 flex-grow">
                                <h3 class="text-lg font-semibold text-gray-900">Passcode <span class="text-sm font-normal text-blue-600">(Recommended)</span></h3>
                                <p class="text-sm text-gray-600 mt-1">Works with iCloud Keychain, 1Password, and modern password managers. Seamless auto-fill on all your devices.</p>
                            </div>
                        </div>
                    </button>
                </form>

                <!-- Classic TOTP -->
                <form method="post" action="/mfa/setup/totp">
                    <button type="submit" class="w-full text-left border-2 border-gray-200 hover:border-gray-400 rounded-lg p-6 transition duration-150">
                        <div class="flex items-start">
                            <div class="flex-shrink-0">
                                <svg class="h-6 w-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                                </svg>
                            </div>
                            <div class="ml-4 flex-grow">
                                <h3 class="text-lg font-semibold text-gray-900">Authenticator App</h3>
                                <p class="text-sm text-gray-600 mt-1">Google Authenticator, Authy, Microsoft Authenticator, etc. Scan QR code with dedicated app.</p>
                            </div>
                        </div>
                    </button>
                </form>

                <!-- Email Only -->
                <form method="post" action="/mfa/setup/email">
                    <button type="submit" class="w-full text-left border-2 border-gray-200 hover:border-gray-400 rounded-lg p-6 transition duration-150">
                        <div class="flex items-start">
                            <div class="flex-shrink-0">
                                <svg class="h-6 w-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                                </svg>
                            </div>
                            <div class="ml-4 flex-grow">
                                <h3 class="text-lg font-semibold text-gray-900">Email Only</h3>
                                <p class="text-sm text-gray-600 mt-1">Receive codes via email each login. Less secure but always available.</p>
                            </div>
                        </div>
                    </button>
                </form>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-200 text-center">
                <a href="/dashboard" class="text-sm text-gray-600 hover:text-gray-900">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
