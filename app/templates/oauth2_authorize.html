{% extends "base.html" %}

{% block title %}Authorize Application - Loom{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm p-8">
            <h1 class="text-2xl font-semibold text-center mb-6 text-gray-900 dark:text-gray-100">Authorize Application</h1>

            <div class="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-gray-700 text-blue-800 dark:text-blue-300 px-4 py-3 rounded mb-6">
                <p class="font-semibold mb-2">{{ client.name }}</p>
                <p class="text-sm">This application is requesting access to your account.</p>
            </div>

            <div class="mb-6">
                <p class="text-sm text-gray-600 dark:text-gray-400 mb-2">Signed in as:</p>
                <p class="font-semibold text-gray-900 dark:text-gray-100">{{ user.first_name }} {{ user.last_name }}</p>
                <p class="text-sm text-gray-600 dark:text-gray-400">{{ user.email }}</p>
            </div>

            <form method="post" action="/oauth2/authorize">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="auth_request_id" value="{{ auth_request_id }}">

                <div class="flex gap-4">
                    <button
                        type="submit"
                        name="action"
                        value="allow"
                        class="flex-1 bg-blue-600 text-white py-3 px-4 rounded hover:bg-blue-700 font-semibold"
                    >
                        Allow
                    </button>
                    <button
                        type="submit"
                        name="action"
                        value="deny"
                        class="flex-1 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 py-3 px-4 rounded hover:bg-gray-300 dark:hover:bg-gray-600 font-semibold"
                    >
                        Deny
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
