# nginx/conf.d/app.conf
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  # explicit wildcard + base
  server_name pageloom.localhost *.pageloom.localhost;

  ssl_certificate     /certs/dev.crt;   # your *.pageloom.localhost cert
  ssl_certificate_key /certs/dev.key;

  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-Proto https;

  location / {
    proxy_pass http://app:8000;
  }
}
