{% extends "base.html" %}

{% block title %}Sign In - Loom{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-sm p-8">
            <h1 class="text-2xl font-semibold text-center mb-6">Sign In</h1>

            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded mb-6" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login" id="loginForm">
                <input type="hidden" id="timezone" name="timezone" value="">
                <input type="hidden" id="locale" name="locale" value="">
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" id="email" name="email" required autofocus>
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" id="password" name="password" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition duration-150">Sign In</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const locale = navigator.language || navigator.userLanguage || 'en-US';
    document.getElementById('timezone').value = tz;
    document.getElementById('locale').value = locale.replace('-', '_');
});
</script>
{% endblock %}
