version: 2
updates:
  # Python dependencies (Poetry via pip ecosystem)
  # Only direct deps — transitive deps in prod_requirements.lock.txt
  # are managed by poetry and synced by the sync-prod-requirements workflow.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    allow:
      - dependency-type: "direct"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

  # Docker base images (dev)
  - package-ecosystem: "docker"
    directory: "/app"
    schedule:
      interval: "monthly"

  # Docker base images (production)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
