name: Sync prod requirements

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - poetry.lock

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry with export plugin
        run: |
          pipx install poetry==2.2.1
          pipx inject poetry poetry-plugin-export

      - name: Export production requirements
        run: poetry export --only main --without-hashes -f requirements.txt -o prod_requirements.lock.txt

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet prod_requirements.lock.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated requirements
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prod_requirements.lock.txt
          git commit -m "Sync prod_requirements.lock.txt with poetry.lock [skip ci]"
          git push
