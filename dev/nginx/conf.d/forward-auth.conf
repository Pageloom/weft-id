# dev/nginx/conf.d/forward-auth.conf
#
# Second-domain vhost used by the opt-in forward-auth cross-domain E2E test
# (tests/e2e/test_forward_auth_cross_domain.py). This represents a domain the
# operator owns (here `*.protected.localhost`) that is DISTINCT from the WeftID
# tenant base domain (`*.weftid.localhost`). It lets the test exercise the real
# cross-domain handshake: the per-domain forward-auth cookie is scoped to
# `protected.localhost`, separate from the tenant session cookie on
# `weftid.localhost`.
#
# Both the portal host (`auth.<sub>.protected.localhost`) and the app host
# (`<sub>.protected.localhost`) are proxied to the same WeftID app. The app's
# TenantGuardMiddleware resolves the owning tenant from the portal host for
# `/forward-auth/*`. Harmless when the test is not run: it only adds routing
# for a domain nothing else uses.
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name protected.localhost *.protected.localhost;

  # Reuse the dev cert (CN/SAN cover *.weftid.localhost). The E2E client
  # connects with TLS verification disabled, so the SAN mismatch is fine for
  # this dev-only second domain.
  ssl_certificate     /certs/dev.crt;
  ssl_certificate_key /certs/dev.key;

  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Host $host;

  location / {
    proxy_pass http://app:8000;
  }
}
