{% extends "base.html" %}

{% block title %}Profile Settings - Loom{% endblock %}

{% block content %}
<div class="max-w-4xl">
    <div class="bg-white rounded-lg shadow-sm p-8">
        <h1 class="text-2xl font-semibold mb-6">Profile Settings</h1>

        <form method="post" action="/settings/profile" class="space-y-6">
            <div>
                <label for="first_name" class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    required>
            </div>

            <div>
                <label for="last_name" class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    required>
            </div>

            <div class="pt-4">
                <button type="submit"
                    class="bg-blue-600 text-white hover:bg-blue-700 font-medium py-2 px-4 rounded-md transition duration-150">
                    Save Changes
                </button>
                <a href="/dashboard" class="ml-3 border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium py-2 px-4 rounded-md transition duration-150 inline-block">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
