name: E2E Tests

on:
  schedule:
    - cron: '0 6 * * *'
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      test_filter:
        description: "pytest -k filter (leave blank for all)"
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  check-activity:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          COUNT=$(gh api repos/${{ github.repository }}/commits?since=$SINCE --jq 'length')
          echo "should_run=$( [ "$COUNT" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  remove-label:
    if: github.event_name == 'pull_request' && github.event.label.name == 'run-e2e'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove run-e2e label
        run: gh api repos/${{ github.repository }}/issues/${{ github.event.number }}/labels/run-e2e -X DELETE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    needs: [check-activity, remove-label]
    if: |
      always()
      && (needs.remove-label.result == 'skipped' || needs.remove-label.result == 'success')
      && (
        (github.event_name == 'pull_request' && github.event.label.name == 'run-e2e')
        || (github.event_name == 'schedule' && needs.check-activity.outputs.should_run == 'true')
        || github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Create .env from dev example
        run: |
          cp .env.dev.example .env
          sed -i 's/^BYPASS_OTP=false/BYPASS_OTP=true/' .env

      - name: Build Tailwind CSS
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.17/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          ./tailwindcss-linux-x64 -i static/css/input.css -o static/css/output.css --minify

      - name: Generate self-signed TLS certificates
        run: |
          mkdir -p .devcerts
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout .devcerts/dev.key \
            -out .devcerts/dev.crt \
            -days 1 \
            -subj '/CN=weftid.localhost' \
            -addext 'subjectAltName=DNS:weftid.localhost,DNS:*.weftid.localhost'

      - name: Add /etc/hosts entries
        run: |
          echo "127.0.0.1 weftid.localhost dev.weftid.localhost e2e-idp.weftid.localhost e2e-sp.weftid.localhost" \
            | sudo tee -a /etc/hosts

      - name: Start Docker Compose services
        run: docker compose --project-directory . -f dev/docker-compose.yml up --build -d app db reverse-proxy maildev migrate memcached

      - name: Wait for services to be ready
        run: |
          echo "Waiting for app to be reachable via nginx..."
          for i in $(seq 1 60); do
            if curl -sk -o /dev/null -w '%{http_code}' https://dev.weftid.localhost/login 2>/dev/null | grep -q '200'; then
              echo "App is ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for app"
          docker compose --project-directory . -f dev/docker-compose.yml logs --tail=50
          exit 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxmlsec1-dev libxmlsec1-openssl pkg-config

      - name: Install Poetry
        run: pipx install poetry==2.2.1

      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: e2e-venv-${{ runner.os }}-3.12-${{ hashFiles('poetry.lock') }}

      - name: Install Python dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction

      - name: Install Playwright browsers
        run: poetry run playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          FILTER="${{ github.event.inputs.test_filter }}"
          if [ -n "$FILTER" ]; then
            poetry run python -m pytest tests/e2e/ -n 0 -v --tb=short -k "$FILTER"
          else
            poetry run python -m pytest tests/e2e/ -n 0 -v --tb=short
          fi

      - name: Docker Compose logs
        if: failure()
        run: docker compose --project-directory . -f dev/docker-compose.yml logs --tail=200

      - name: Stop services
        if: always()
        run: docker compose --project-directory . -f dev/docker-compose.yml down
