# dev/nginx/conf.d/app.conf
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  # explicit wildcard + base
  server_name weftid.localhost *.weftid.localhost;

  ssl_certificate     /certs/dev.crt;   # your *.weftid.localhost cert
  ssl_certificate_key /certs/dev.key;

  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-Proto https;
  # Real client IP for per-IP rate limiting (ProxyHeadersMiddleware reads
  # this). $proxy_add_x_forwarded_for appends the real peer to any
  # existing chain; uvicorn/Starlette takes the client from it.
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  # Authoritative outward-facing host. Setting it to the validated $host
  # makes x-forwarded-host proxy-controlled, so absolute URLs we surface
  # to IdPs (SCIM meta.location) cannot be spoofed by a client injecting
  # its own X-Forwarded-Host header.
  proxy_set_header X-Forwarded-Host $host;

  location / {
    proxy_pass http://app:8000;
  }
}
