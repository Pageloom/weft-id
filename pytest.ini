[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -n auto
filterwarnings =
    ignore::DeprecationWarning:onelogin.*:
markers =
    unit: Fast tests with mocked database/service dependencies
    integration: Slow tests requiring real database connection
