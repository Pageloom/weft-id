{% extends "base.html" %}

{% block title %}{{ error_title }} - WeftId{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm p-8">
            <h1 class="text-2xl font-semibold text-center mb-6 text-gray-900 dark:text-gray-100">{{ error_title }}</h1>

            <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-800 dark:text-red-300 px-4 py-3 rounded mb-6" role="alert">
                <p class="font-semibold mb-2">{{ error_message }}</p>
                {% if error_code %}
                <p class="text-sm text-red-600 dark:text-red-400">Error code: {{ error_code }}</p>
                {% endif %}
            </div>

            <div class="text-center">
                <a href="/dashboard" class="text-blue-600 dark:text-blue-400 hover:underline">Return to Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
