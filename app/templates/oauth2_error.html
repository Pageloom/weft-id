{% extends "base.html" %}

{% block title %}Authorization Error - Loom{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-sm p-8">
            <h1 class="text-2xl font-semibold text-center mb-6">Authorization Error</h1>

            <div class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded mb-6" role="alert">
                <p class="font-semibold mb-2">{{ error }}</p>
                {% if error_description %}
                <p class="text-sm">{{ error_description }}</p>
                {% endif %}
            </div>

            <div class="text-center">
                <a href="/dashboard" class="text-blue-600 hover:underline">Return to Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
