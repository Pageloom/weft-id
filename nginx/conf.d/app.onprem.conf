# nginx/conf.d/app.onprem.conf.template
# On-prem nginx config for Let's Encrypt SSL
#
# This is a template file. Run devscripts/onprem-setup.sh to generate
# the actual config with your domain substituted.
#
# Placeholder: dev.pageloom.com will be replaced with your actual domain

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  # Accept base domain and wildcard subdomains
  server_name dev.pageloom.com *.dev.pageloom.com;

  # Let's Encrypt certificate paths
  ssl_certificate     /etc/letsencrypt/live/dev.pageloom.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dev.pageloom.com/privkey.pem;

  # SSL configuration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;

  location / {
    proxy_pass http://app:8000;
  }
}
